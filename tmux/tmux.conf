# ==============================================================================
#  Server Options
# ==============================================================================
set -s escape-time 30          # Resolve delay for the ESC key in Vim/Neovim
set -s focus-events on         # Allow terminal to pass focus events to apps inside tmux

# ==============================================================================
#  Terminal & Colors
# ==============================================================================
set -g default-terminal "xterm-256color" # windows-terminal #"tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g allow-passthrough on    # Allow raw escape sequences (like images) to pass through

# Undercurl & Underscore Colors (Kitty protocol & Windows Terminal support)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ==============================================================================
#  Plugins
# ==============================================================================
#set -g @plugin 'tmux-plugins/tpm'
#set -g @tmux-which-key-disable-autobuild 1
#set -g @plugin 'alexwforsythe/tmux-which-key'

#run '~/.config/tmux/plugins/tpm/tpm'

# ==============================================================================
#  Key Bindings: Prefix & Core
# ==============================================================================
unbind C-b                     # Unbind default prefix
set -g prefix C-a              # Set prefix to Ctrl-a
bind C-a send-prefix           # Send prefix to inner session (useful for nested tmux/SSH)

# Reload config file and display a message
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Tmux config reloaded!"

# ==============================================================================
#  Key Bindings: Panes
# ==============================================================================
unbind Left
unbind Down
unbind Up
unbind Right

# Pane navigation (Vim-like)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Pane resizing (Repeatable)
bind -r H resize-pane -L 4
bind -r J resize-pane -D 4
bind -r K resize-pane -U 4
bind -r L resize-pane -R 4

# Swap panes (Repeatable)
bind -r > swap-pane -D         # Swap current pane with the next one
bind -r < swap-pane -U         # Swap current pane with the previous one

# Split panes (Removed -r to prevent accidental rapid-fire splits)
bind '"' split-window -v -c "#{pane_current_path}"
bind "'" split-window -h -c "#{pane_current_path}"

# Other pane functions
bind m resize-pane -Z          # Maximize/restore current pane
bind-key x kill-pane           # Delete without confirmation

# ==============================================================================
#  Global Settings
# ==============================================================================
set -g history-limit 1010101010    # Boost scrollback buffer size
setw -g mouse on                # Enable mouse support (scrolling, clicking, resizing)
set -g set-clipboard on        # Allow tmux to interact with the system clipboard

set -g base-index 1            # Start window indexing at 1 (instead of 0)
setw -g pane-base-index 1      # Start pane indexing at 1
set -g renumber-windows on     # Re-index windows automatically when one is closed
setw -g automatic-rename on    # Rename window automatically to reflect current program
set-option -g status-position top

set -g set-titles on           # Update the host terminal's title bar
set -g set-titles-string "#T"

# ==============================================================================
#  UI & Status Line
# ==============================================================================
set -g status-interval 10       # Redraw status line every 1 second
set -g status-justify absolute-centre # Center the window list

# Core styling
set -g status-style "bg=default,fg=#999982"  # Base style
#set -g pane-border-style "fg=colour238"        # Pane borders # dark-gray
#set -g pane-active-border-style "fg=#cc5f29"   # orange
set -g pane-border-style "fg=#00344d"           # blue
set -g pane-active-border-style "fg=#999982"    # gray
set -g message-style "fg=#cccca5"
set -g message-command-style "bg=#002333,fg=#cccca5"
set -g display-panes-colour "#cc5f29"        # orange (formerly colour166)
set -g display-panes-active-colour "#5ca8cc" # blue   (formerly colour33)
setw -g clock-mode-colour "#78ba8d"          # green  (formerly colour64)

# Left: session, orange on prefix
set -g status-left-length 100
#set -g status-left "#{?client_prefix,#[fg=#cc5f29][s: #S],#[fg=default][s: #S]}"
set -g status-left "#{?client_prefix,#[fg=#cc5f29][#S],#[fg=default][#S]}"

# Right: disabled
set -g status-right-length 0
set -g status-right ""

# Window name: current command
setw -g automatic-rename on
setw -g automatic-rename-format "#{pane_current_command}"

# Block app renames
set -g allow-rename off

# Windows: orange when active, [Z] if zoomed
setw -g window-status-current-style "fg=#cc5f29,bg=default,bold"
setw -g window-status-current-format '#I:#W #[fg=#5ca8cc]#{?window_zoomed_flag,[Z],} '
setw -g window-status-format '#I:#W #[fg=#5ca8cc]#{?window_zoomed_flag,[Z],} '

